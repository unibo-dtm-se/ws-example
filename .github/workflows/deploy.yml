name: deploy
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
  packages: write
jobs:
  release:
    name: Release
    concurrency:
      # Only one release job at a time. Strictly sequential.
      group: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # all history

      - name: Get All Tags
        run: git fetch --tags -f

      - name: Dry-run Release for Initial Commit
        id: skip_release
        run: |
          if git rev-parse HEAD^1 >/dev/null 2>&1; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Restore Development Environment
        run: poetry install
        working-directory: backend

      # Uncomment to change default logging level during release
      # - name: Change default logging level
      #   run: sed -i -e 's/logging.DEBUG/logging.WARN/g' **/*/__init__.py

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Release
        shell: bash
        run: |
          npm ci
          npx semantic-release --config ../.github/release.config.mjs
        working-directory: frontend
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          RELEASE_TEST_PYPI: ${{ github.event.repository.is_template || contains(github.repository, 'template') }}
          # dry run if not on main/master branch, or if initial commit
          RELEASE_DRY_RUN: ${{ steps.skip_release.outputs.skip == 'true' || (github.ref_name != 'master' && github.ref_name != 'main') }}
